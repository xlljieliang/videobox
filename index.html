<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>iPad本地视频播放器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        /* 视频容器 */
        .video-container {
            width: 100%;
            height: calc(100vh - 120px);
            position: relative;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        /* 顶部文件选择栏 */
        .file-select {
            width: 100%;
            height: 40px;
            background: #222;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
        }
        #fileInput {
            display: none; /* 隐藏原生文件选择框 */
        }
        .file-btn {
            padding: 6px 16px;
            border: none;
            border-radius: 6px;
            background: #007aff;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
        .file-name {
            color: white;
            margin-left: 15px;
            font-size: 14px;
            max-width: 60%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        /* 控制栏 */
        .controls {
            width: 100%;
            height: 80px;
            background: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 0 20px;
        }
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            background: #007aff;
            color: white;
            font-size: 18px;
            cursor: pointer;
            flex: 1;
        }
        button:hover {
            background: #0066cc;
        }
        .play-btn {
            background: #34c759;
        }
    </style>
</head>
<body>
    <!-- 本地文件选择栏 -->
    <div class="file-select">
        <label for="fileInput" class="file-btn">选择本地视频</label>
        <input type="file" id="fileInput" accept="video/mp4,video/m4v,video/avi,video/mov">
        <span class="file-name" id="fileName">未选择文件</span>
    </div>

    <!-- 视频容器 -->
    <div class="video-container" id="videoContainer">
        <video id="player" controls preload="metadata">
            你的浏览器不支持HTML5视频播放
        </video>
    </div>

    <!-- 控制栏 -->
    <div class="controls">
        <button class="speed-btn" data-speed="1.0">1.0x</button>
        <button class="speed-btn" data-speed="1.5">1.5x</button>
        <button class="speed-btn" data-speed="2.0">2.0x</button>
        <button class="speed-btn" data-speed="2.5">2.5x</button>
        <button class="speed-btn" data-speed="3.0">3.0x</button>
        <button class="play-btn" id="playPauseBtn">播放</button>
    </div>

    <script>
        // 获取核心元素
        const player = document.getElementById('player');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const speedBtns = document.querySelectorAll('.speed-btn');
        const videoContainer = document.getElementById('videoContainer');
        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('fileName');
        
        // 保存原始倍速（仅用于倍速按钮切换，无长按逻辑）
        let originalPlaybackRate = 1.0;
        // 记录双击时间（用于区分单击和双击）
        let lastClickTime = 0;
        
        // 1. 本地文件选择功能
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            // 显示选中的文件名
            fileName.textContent = file.name;
            
            // 将本地文件转换为临时URL
            const videoUrl = URL.createObjectURL(file);
            player.src = videoUrl;
            
            // 重置播放状态
            playPauseBtn.textContent = '播放';
            originalPlaybackRate = 1.0;
            player.playbackRate = originalPlaybackRate;
            speedBtns.forEach(b => b.style.background = '#007aff');
            speedBtns[0].style.background = '#0056b3';
        });

        // 2. 播放/暂停核心函数
        function togglePlayPause() {
            // 未选择文件时提示
            if (!player.src) {
                alert('请先选择本地视频文件！');
                return;
            }
            
            if (player.paused) {
                player.play();
                playPauseBtn.textContent = '暂停';
            } else {
                player.pause();
                playPauseBtn.textContent = '播放';
            }
        }

        // 按钮播放/暂停
        playPauseBtn.addEventListener('click', togglePlayPause);

        // 3. 倍速调节功能
        speedBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                if (!player.src) {
                    alert('请先选择本地视频文件！');
                    return;
                }
                
                const speed = parseFloat(btn.dataset.speed);
                originalPlaybackRate = speed;
                player.playbackRate = originalPlaybackRate;
                speedBtns.forEach(b => b.style.background = '#007aff');
                btn.style.background = '#0056b3';
            });
        });

        // 4. 双击视频区域播放/暂停（仅保留双击，无长按）
        videoContainer.addEventListener('click', (e) => {
            // 排除控制按钮区域的点击
            if (e.target === playPauseBtn || Array.from(speedBtns).includes(e.target)) {
                return;
            }
            
            const currentTime = new Date().getTime();
            const isDoubleClick = currentTime - lastClickTime < 300;
            
            if (isDoubleClick) {
                togglePlayPause();
                lastClickTime = 0;
            } else {
                lastClickTime = currentTime;
            }
        });

        // 视频结束重置
        player.addEventListener('ended', () => {
            playPauseBtn.textContent = '播放';
            originalPlaybackRate = 1.0;
            player.playbackRate = originalPlaybackRate;
            speedBtns.forEach(b => b.style.background = '#007aff');
            speedBtns[0].style.background = '#0056b3';
        });
    </script>
</body>
</html>
